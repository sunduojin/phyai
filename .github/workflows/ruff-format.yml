name: ruff format

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ruff-format:
    name: check Python formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check formatting
        run: uvx --from ruff==0.8.4 ruff format --check .
